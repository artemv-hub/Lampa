name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate index.html with file listing
        run: |
          echo '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Index of /Lampa</title><style>body{font-family:system-ui;margin:2rem} ul{list-style:none;padding:0} li{margin:0.5rem 0}</style></head><body><h1>📂 /Lampa</h1><ul>' > index.html
          find . -maxdepth 1 -type f -not -name "index.html" -printf '<li><a href="%f">%f</a></li>\n' >> index.html
          echo '</ul></body></html>' >> index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
